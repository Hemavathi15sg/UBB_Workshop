name: Payments API CI

on:
  pull_request:
    paths:
      - "services/payments-api/**"
      - "packages/shared-domain/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:payments
